      <section class="rounded-brand-lg border border-outline bg-navy-surface">
        <!-- Status row: pulsing gold, mirrors dev-server status row layout -->
        <div class="flex items-center gap-3 px-8 py-5 border-b border-outline">
          <span class="relative inline-flex h-2.5 w-2.5">
            <span class="absolute inline-flex h-full w-full rounded-full bg-gold opacity-60 animate-pulse-dot"></span>
            <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-gold"></span>
          </span>
          <span class="text-on-surface text-xs font-semibold uppercase tracking-widest"> Starting </span>
          <span aria-hidden="true" class="ml-auto text-on-surface-subtle text-xs font-mono uppercase tracking-widest"> Auto-refresh 2s </span>
        </div>

        <div class="px-8 py-10 space-y-8">
          <!-- Spinner: gold ring, restrained 40px size; only motion on the page -->
          <div class="flex justify-center">
            <div class="h-10 w-10 rounded-full border-2 border-outline border-t-gold animate-spin"></div>
          </div>

          <p class="text-center text-on-surface-muted text-base leading-relaxed">Waiting for the Vite development server to come up. This page will reload automatically.</p>

          <div>
            <p class="text-on-surface-subtle text-xs font-semibold uppercase tracking-widest mb-3 text-center">Connecting to</p>
            <div class="rounded-brand border-l-[3px] border-l-gold border border-outline bg-navy-surface-variant px-4 py-3">
              <span class="block text-center font-mono text-sm text-gold select-all">{{ vite_url }}</span>
            </div>
          </div>
        </div>
